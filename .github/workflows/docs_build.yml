# based on: https://squidfunk.github.io/mkdocs-material/publishing-your-site/
name: Build documentation
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # (root folder loose files are always cloned)
          sparse-checkout: |
            docs
      - name: "Configure Git credentials"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        shell: bash
      - name: "Install uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true
          activate-environment: true
      - uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      # install only the docs dependencies and not the others
      - run: uv sync --no-group dev --no-group lint --group docs
      - name: "Run mkdocs, set up and deploy documentation"
        run: mkdocs gh-deploy --force
