# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: "Stellaris Mod Deploy Tool"
site_url: https://Aerolfos.github.io/stellaris_mod_deploy_action/
theme:
  name: readthedocs

repo_url: https://github.com/Aerolfos/stellaris_mod_deploy_action
site_description: "GitHub actions setup to automate deploying Stellaris mods"

edit_uri_template: "blob/main/docs/{path}"

nav:
  - Home: "README.md"
  - General Stellaris Mod Support:
      - Installing from GitHub: General Stellaris mod support/mod_installation.md
      - Mod file locations on disk: General Stellaris mod support/mod_file_locations.md

  - Tool Support:
      - Setting up the tool: Tool support/tool_setup.md
      - Expected mod folder structure: Tool support/expected_mod_structure.md
  - Miscellaneous:
      - Potential tool features: Miscellaneous/potential_tool_features.md
  - About:
      Readme: "/README.md"
      License: "/LICENSE"

markdown_extensions:
  - toc:
      permalink: "#"
      separator: "_"

# base64 encoded starbase icon (used as logo for docs)
# &logo=data:image/png;base64,
